{% extends "base.html" %}

{% block title %}Company Registration — Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-12 col-md-7 col-lg-6">

        <div class="card shadow-sm border-0">
            <div class="card-header bg-info text-white py-3">
                <h4 class="mb-0">
                    <i class="bi bi-building-add me-2"></i>Company Registration
                </h4>
                <small class="opacity-75">Register your company — pending admin approval</small>
            </div>

            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('register_company') }}" novalidate>

                    <div class="row g-3">

                        <!-- HR / Representative Name -->
                        <div class="col-12">
                            <label for="name" class="form-label fw-semibold">
                                <i class="bi bi-person me-1"></i>HR / Representative Name
                            </label>
                            <input
                                type="text"
                                class="form-control"
                                id="name"
                                name="name"
                                placeholder="Contact person's full name"
                                required
                                autofocus
                            />
                        </div>

                        <!-- Email -->
                        <div class="col-12">
                            <label for="email" class="form-label fw-semibold">
                                <i class="bi bi-envelope me-1"></i>Official Email
                            </label>
                            <input
                                type="email"
                                class="form-control"
                                id="email"
                                name="email"
                                placeholder="hr@yourcompany.com"
                                required
                            />
                        </div>

                        <!-- Password -->
                        <div class="col-12">
                            <label for="password" class="form-label fw-semibold">
                                <i class="bi bi-lock me-1"></i>Password
                            </label>
                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                name="password"
                                placeholder="Minimum 6 characters"
                                required
                                minlength="6"
                            />
                        </div>

                        <!-- Company Name -->
                        <div class="col-12">
                            <label for="company_name" class="form-label fw-semibold">
                                <i class="bi bi-building me-1"></i>Company Name
                            </label>
                            <input
                                type="text"
                                class="form-control"
                                id="company_name"
                                name="company_name"
                                placeholder="Your company's legal name"
                                required
                            />
                        </div>

                        <!-- HR Contact -->
                        <div class="col-md-6">
                            <label for="hr_contact" class="form-label fw-semibold">
                                <i class="bi bi-telephone me-1"></i>HR Contact Number
                            </label>
                            <input
                                type="tel"
                                class="form-control"
                                id="hr_contact"
                                name="hr_contact"
                                placeholder="e.g. 9876543210"
                            />
                        </div>

                        <!-- Website -->
                        <div class="col-md-6">
                            <label for="website" class="form-label fw-semibold">
                                <i class="bi bi-globe me-1"></i>Website <small class="text-muted">(optional)</small>
                            </label>
                            <input
                                type="url"
                                class="form-control"
                                id="website"
                                name="website"
                                placeholder="https://yourcompany.com"
                            />
                        </div>

                    </div><!-- /row -->

                    <!-- Note about approval -->
                    <div class="alert alert-warning mt-3 py-2 small">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        Your account will be reviewed by the admin before you can log in.
                    </div>

                    <!-- Submit -->
                    <div class="d-grid mt-2">
                        <button type="submit" class="btn btn-info text-white btn-lg">
                            <i class="bi bi-send me-2"></i>Submit for Approval
                        </button>
                    </div>

                </form>
            </div>

            <div class="card-footer bg-white text-center py-3">
                Already registered?
                <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold">Login here</a>
            </div>
        </div>

    </div>
</div>
{% endblock %}
